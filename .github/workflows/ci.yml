name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test-and-gates:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db

      - name: Format check
        run: cargo fmt --all --check

      - name: Workspace tests
        run: cargo test --workspace

      - name: Lint (clippy deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: H3 feature compile check
        run: cargo check -p vidarax-api --features h3-experimental

      - name: H3 integration tests
        run: cargo test -p vidarax-api --features h3-experimental

      - name: API smoke test
        run: ./scripts/smoke_v1.sh

      - name: Staging provider E2E (opt-in)
        env:
          VIDARAX_STAGING_VLLM_BASE_URL: ${{ secrets.VIDARAX_STAGING_VLLM_BASE_URL }}
          VIDARAX_STAGING_SGLANG_BASE_URL: ${{ secrets.VIDARAX_STAGING_SGLANG_BASE_URL }}
          VIDARAX_STAGING_MODEL: ${{ secrets.VIDARAX_STAGING_MODEL }}
          VIDARAX_STAGING_PROMPT: ${{ secrets.VIDARAX_STAGING_PROMPT }}
        run: ./scripts/staging_provider_e2e.sh

      - name: Release gates
        run: ./scripts/release_gates.sh

  vidarax-core-vp8:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install ffmpeg and libvpx
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libvpx-dev clang libclang-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.88.0
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db

      - name: Build vidarax-core with VP8
        run: cargo build -p vidarax-core --features vp8

      - name: Test vidarax-core with VP8
        run: cargo test -p vidarax-core --features vp8

      - name: Lint vidarax-core with VP8
        run: cargo clippy -p vidarax-core --features vp8 --all-targets -- -D warnings

  web-sdk:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/vidarax-sdk/package-lock.json

      - name: Install dependencies
        working-directory: packages/vidarax-sdk
        run: npm ci

      - name: Typecheck
        working-directory: packages/vidarax-sdk
        run: npm run typecheck

      - name: Build
        working-directory: packages/vidarax-sdk
        run: npm run build

      - name: Unit tests
        working-directory: packages/vidarax-sdk
        run: npx vitest run tests/client.test.ts

  web-ui:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

  spacetime-wasm:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db
        with:
          workspaces: spacetime-module

      - name: Build
        working-directory: spacetime-module
        run: cargo build --locked --release --target wasm32-unknown-unknown

  web-ui-e2e:
    runs-on: [self-hosted, vidarax]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium webkit

      - name: End-to-end tests
        working-directory: ui
        run: npx playwright test
