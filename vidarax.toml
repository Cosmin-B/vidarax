# Vidarax backend configuration.
# Backends are tried in priority order (lowest = first).
# String values support ${ENV_VAR} interpolation.

[[backends]]
name = "vllm"
type = "openai_compat"
base_url = "${VIDARAX_VLLM_BASE_URL}"
priority = 1

[[backends]]
name = "sglang"
type = "openai_compat"
base_url = "${VIDARAX_SGLANG_BASE_URL}"
priority = 2

