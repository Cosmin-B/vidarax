[package]
name = "vidarax-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde_json = "1"
vidarax-contracts = { path = "../vidarax-contracts" }

[dev-dependencies]
jsonschema = "0.42"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
