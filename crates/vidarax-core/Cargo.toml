[package]
name = "vidarax-core"
version = "0.1.0"
edition = "2021"

[dependencies]
libc = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde_json = "1"
vidarax-contracts = { path = "../vidarax-contracts" }
openh264 = "0.6"
jpeg-encoder = "0.6"
kanal = "0.1"
core_affinity = "0.8"
crossbeam = "0.8"

[dev-dependencies]
jsonschema = "0.42"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rustrtc = { git = "https://github.com/restsend/rustrtc" }
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["json"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
